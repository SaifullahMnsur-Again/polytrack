<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyTrack Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie@latest/dist/dexie.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIlBvbHlUcmFjayIsCiAgInNob3J0X25hbWUiOiAiUG9seVRyYWNrIiwKICAic3RhcnRfdXJsIjogIi4vIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjMTFlMTIiLAogICJ0aGVtZV9jb2xvciI6ICIjMTA2YjRlIiwKICAiaWNvbnMiOiBbCiAgICB7CiAgICAgICJzcmMiOiAiaHR0cHM6Ly9jZG4taWNvbnMtcG5nLmZsYXRpY29uLmNvbS81MTIvMjkwNS8yOTA1Njg2LnBuZyIsCiAgICAgICJzaXplcyI6ICI1MTJ4NTEyIiwKICAgICAgInR5cGUiOiAiaW1hZ2UvcG5nIgogICAgfQogIF1KfQ==">
    <meta name="theme-color" content="#106b4e">
    <style>
        .sheet-open { transform: translateY(0); }
        .sheet-close { transform: translateY(100%); }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen pb-24">

    <header class="bg-slate-800 border-b border-slate-700 sticky top-0 z-40 px-4 py-3 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold text-emerald-400 tracking-wide">♻️ PolyTrack</h1>
        <div class="flex space-x-1">
            <button onclick="switchMainTab('dashboard')" id="btn-main-dashboard" class="px-3 py-1.5 rounded-lg text-xs font-medium bg-emerald-600 text-white">Records</button>
            <button onclick="switchMainTab('stats')" id="btn-main-stats" class="px-3 py-1.5 rounded-lg text-xs font-medium text-slate-400">Stats</button>
            <button onclick="switchMainTab('config')" id="btn-main-config" class="px-3 py-1.5 rounded-lg text-xs font-medium text-slate-400">Settings</button>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4">
        <div id="toast" class="hidden fixed top-16 left-1/2 transform -translate-x-1/2 z-50 bg-emerald-600 text-white px-4 py-2 rounded-full shadow-lg text-xs transition-all duration-300"></div>

        <section id="sect-dashboard" class="space-y-4">
            <div class="bg-slate-800 p-3.5 rounded-xl border border-slate-700 space-y-3 shadow-md">
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-[11px] font-semibold uppercase tracking-wider text-slate-400">Filter Source</label>
                        <select id="filter-source" onchange="renderHistory()" class="w-full bg-slate-700 rounded-lg p-2 mt-1 text-xs text-slate-200 border border-slate-600 focus:outline-none"></select>
                    </div>
                    <div>
                        <label class="text-[11px] font-semibold uppercase tracking-wider text-slate-400">Filter Size</label>
                        <select id="filter-size" onchange="renderHistory()" class="w-full bg-slate-700 rounded-lg p-2 mt-1 text-xs text-slate-200 border border-slate-600 focus:outline-none"></select>
                    </div>
                </div>
            </div>
            <div id="history-container" class="space-y-2"></div>
        </section>

        <section id="sect-stats" class="hidden space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-slate-800 border border-slate-700 p-4 rounded-xl">
                    <p class="text-[11px] text-slate-400 uppercase font-semibold">Total Bags Stored</p>
                    <p id="stat-total-bags" class="text-3xl font-extrabold text-emerald-400 mt-1">0</p>
                </div>
                <div class="bg-slate-800 border border-slate-700 p-4 rounded-xl">
                    <p class="text-[11px] text-slate-400 uppercase font-semibold">Drop Events</p>
                    <p id="stat-total-events" class="text-3xl font-extrabold text-sky-400 mt-1">0</p>
                </div>
            </div>
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 space-y-6">
                <div>
                    <h3 class="text-xs font-semibold text-slate-400 uppercase text-center mb-2">Distribution by Source</h3>
                    <div class="h-48"><canvas id="sourceChart"></canvas></div>
                </div>
                <hr class="border-slate-700">
                <div>
                    <h3 class="text-xs font-semibold text-slate-400 uppercase text-center mb-2">Distribution by Size</h3>
                    <div class="h-48"><canvas id="sizeChart"></canvas></div>
                </div>
            </div>
        </section>

        <section id="sect-config" class="hidden space-y-6">
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 space-y-3 shadow-md">
                <h3 class="text-xs font-bold text-amber-400 uppercase tracking-wide">Data Loss Immunity</h3>
                <div class="grid grid-cols-2 gap-2 pt-1">
                    <button onclick="exportData()" class="bg-slate-700 hover:bg-slate-600 text-xs py-2.5 font-bold rounded-lg transition">📤 Export JSON</button>
                    <label class="bg-slate-700 hover:bg-slate-600 text-xs py-2.5 font-bold rounded-lg transition text-center cursor-pointer flex items-center justify-center">
                        📥 Import JSON
                        <input type="file" id="import-file" onchange="importData(event)" class="hidden" accept=".json">
                    </label>
                </div>
            </div>

            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 space-y-3">
                <h3 class="text-xs font-bold uppercase text-slate-400 tracking-wider">Modify Sources</h3>
                <div id="config-sources-list" class="space-y-2 max-h-40 overflow-y-auto pr-1"></div>
                <div class="flex space-x-2 pt-1">
                    <input type="text" id="new-source-name" placeholder="New Source Name" class="bg-slate-700 rounded-lg px-3 py-1.5 text-xs w-full focus:outline-none border border-slate-600">
                    <button onclick="addMetadata('sources', 'new-source-name')" class="bg-emerald-600 text-xs font-bold px-3 py-1.5 rounded-lg">Add</button>
                </div>
            </div>

            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 space-y-3">
                <h3 class="text-xs font-bold uppercase text-slate-400 tracking-wider">Modify Sizes</h3>
                <div id="config-sizes-list" class="space-y-2 max-h-40 overflow-y-auto pr-1"></div>
                <div class="flex space-x-2 pt-1">
                    <input type="text" id="new-size-name" placeholder="e.g. XXL" class="bg-slate-700 rounded-lg px-3 py-1.5 text-xs w-full focus:outline-none border border-slate-600">
                    <button onclick="addMetadata('sizes', 'new-size-name')" class="bg-emerald-600 text-xs font-bold px-3 py-1.5 rounded-lg">Add</button>
                </div>
            </div>
        </section>
    </main>

    <div id="fab-container" class="fixed bottom-6 right-6 z-40">
        <button onclick="openBottomSheet()" class="w-14 h-14 bg-emerald-600 hover:bg-emerald-500 rounded-full shadow-2xl flex items-center justify-center text-2xl active:scale-95 transition-transform text-white">
            ➕
        </button>
    </div>

    <div id="bottom-sheet-backdrop" onclick="closeBottomSheet()" class="hidden fixed inset-0 bg-slate-950/70 z-50 backdrop-blur-sm transition-opacity duration-300 opacity-0"></div>
    <div id="bottom-sheet" class="sheet-close fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-slate-800 rounded-t-3xl border-t border-slate-700 z-50 transition-transform duration-300 overflow-hidden shadow-2xl flex flex-col" style="max-height: 65vh;">
        <div class="w-full flex justify-center py-3 cursor-pointer" onclick="closeBottomSheet()">
            <div class="w-12 h-1 bg-slate-600 rounded-full"></div>
        </div>
        
        <div class="p-5 overflow-y-auto space-y-4 pb-8 flex-1">
            <h2 class="text-base font-bold text-slate-200 flex items-center justify-between">
                <span>Record New Polythene</span>
                <button onclick="closeBottomSheet()" class="text-xs text-slate-400 font-normal hover:underline">Cancel</button>
            </h2>
            <form id="poly-form" onsubmit="handleFormSubmit(event)" class="space-y-4">
                <div>
                    <label class="block text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-2">Source (উৎস)</label>
                    <div id="source-buttons-container" class="grid grid-cols-2 gap-2"></div>
                    <input type="hidden" id="selected-source-id" required>
                </div>

                <div>
                    <label class="block text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-2">Size (আকার)</label>
                    <div id="size-buttons-container" class="grid grid-cols-3 gap-2"></div>
                    <input type="hidden" id="selected-size-id" required>
                </div>

                <div>
                    <label class="block text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Quantity</label>
                    <div class="flex items-center space-x-3 bg-slate-700 rounded-xl p-1">
                        <button type="button" onclick="adjustQty(-1)" class="w-10 h-10 bg-slate-600 rounded-lg text-lg font-bold">-</button>
                        <input type="number" id="quantity" value="1" min="1" class="bg-transparent text-center w-full focus:outline-none text-base font-bold" required>
                        <button type="button" onclick="adjustQty(1)" class="w-10 h-10 bg-slate-600 rounded-lg text-lg font-bold">+</button>
                    </div>
                </div>

                <button type="submit" class="w-full mt-2 py-3 bg-emerald-600 hover:bg-emerald-500 font-bold rounded-xl transition duration-200 shadow-md text-sm text-white">
                    Save Record
                </button>
            </form>
        </div>
    </div>

    <script>
        const db = new Dexie("PolyTrackProDB");
        db.version(1).stores({
            logs: '++id, sourceId, sizeId, quantity, datetime',
            sources: '++id, name',
            sizes: '++id, name'
        });

        let lastSubmissionTime = 0;
        let selectedSourceId = null;
        let selectedSizeId = null;
        let sourceChartInstance = null;
        let sizeChartInstance = null;

        db.on("populate", async () => {
            await db.sources.bulkAdd([
                { id: 1, name: "মুদি দোকান" }, { id: 2, name: "কাঁচাবাজার" },
                { id: 3, name: "ক্যান্টিন/হোটেল" }, { id: 4, name: "অন্যান্য" }
            ]);
            await db.sizes.bulkAdd([
                { id: 1, name: "S" }, { id: 2, name: "S-M" }, { id: 3, name: "M" },
                { id: 4, name: "M-L" }, { id: 5, name: "L" }, { id: 6, name: "XL" }
            ]);
        });

        db.open().then(() => {
            loadInputElements();
            populateFilters();
            renderHistory();
        });

        function switchMainTab(tabName) {
            ['dashboard', 'stats', 'config'].forEach(t => {
                document.getElementById(`sect-${t}`).classList.add('hidden');
                document.getElementById(`btn-main-${t}`).className = "px-3 py-1.5 rounded-lg text-xs font-medium text-slate-400";
            });
            document.getElementById(`sect-${tabName}`).classList.remove('hidden');
            document.getElementById(`btn-main-${tabName}`).className = "px-3 py-1.5 rounded-lg text-xs font-medium bg-emerald-600 text-white";

            const fab = document.getElementById('fab-container');
            if (tabName === 'dashboard') { fab.classList.remove('hidden'); renderHistory(); }
            else { fab.classList.add('hidden'); }

            if (tabName === 'stats') renderStats();
            if (tabName === 'config') renderConfigPanel();
        }

        function openBottomSheet() {
            loadInputElements();
            const backdrop = document.getElementById('bottom-sheet-backdrop');
            const sheet = document.getElementById('bottom-sheet');
            backdrop.classList.remove('hidden');
            setTimeout(() => { backdrop.style.opacity = "1"; }, 10);
            sheet.classList.remove('sheet-close');
            sheet.classList.add('sheet-open');
        }

        function closeBottomSheet() {
            const backdrop = document.getElementById('bottom-sheet-backdrop');
            const sheet = document.getElementById('bottom-sheet');
            backdrop.style.opacity = "0";
            setTimeout(() => { backdrop.classList.add('hidden'); }, 300);
            sheet.classList.remove('sheet-open');
            sheet.classList.add('sheet-close');
        }

        async function loadInputElements() {
            const [sources, sizes] = await Promise.all([db.sources.toArray(), db.sizes.toArray()]);
            document.getElementById('source-buttons-container').innerHTML = sources.map(s => `
                <button type="button" data-sid="${s.id}" onclick="selectSource(${s.id})" class="src-btn py-2.5 px-2 bg-slate-700 text-slate-200 rounded-xl border border-transparent text-xs transition font-medium truncate">${s.name}</button>
            `).join('');
            document.getElementById('size-buttons-container').innerHTML = sizes.map(sz => `
                <button type="button" data-zid="${sz.id}" onclick="selectSize(${sz.id})" class="sz-btn py-2 bg-slate-700 text-slate-200 rounded-xl border border-transparent text-xs font-bold transition">${sz.name}</button>
            `).join('');
            selectedSourceId = null; selectedSizeId = null;
        }

        function selectSource(id) {
            selectedSourceId = id;
            document.getElementById('selected-source-id').value = id;
            document.querySelectorAll('.src-btn').forEach(b => {
                b.className = parseInt(b.dataset.sid) === id 
                    ? "src-btn py-2.5 px-2 bg-emerald-600/20 text-emerald-400 border border-emerald-500 rounded-xl text-xs font-medium truncate"
                    : "src-btn py-2.5 px-2 bg-slate-700 text-slate-200 rounded-xl border border-transparent text-xs font-medium truncate";
            });
        }

        function selectSize(id) {
            selectedSizeId = id;
            document.getElementById('selected-size-id').value = id;
            document.querySelectorAll('.sz-btn').forEach(b => {
                b.className = parseInt(b.dataset.zid) === id 
                    ? "sz-btn py-2 bg-emerald-600/20 text-emerald-400 border border-emerald-500 rounded-xl text-xs font-bold"
                    : "sz-btn py-2 bg-slate-700 text-slate-200 rounded-xl border border-transparent text-xs font-bold";
            });
        }

        function adjustQty(val) {
            let el = document.getElementById('quantity');
            let curr = parseInt(el.value) || 1;
            if (curr + val >= 1) el.value = curr + val;
        }

        function showToast(msg) {
            let t = document.getElementById('toast');
            t.textContent = msg; t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            const now = Date.now();
            if (now - lastSubmissionTime < 5000) {
                showToast(`🚫 Wait ${Math.ceil((5000-(now-lastSubmissionTime))/1000)}s.`);
                return;
            }
            if(!selectedSourceId || !selectedSizeId) {
                showToast("⚠️ Complete all fields.");
                return;
            }

            await db.logs.add({
                sourceId: selectedSourceId,
                sizeId: selectedSizeId,
                quantity: parseInt(document.getElementById('quantity').value),
                datetime: new Date().toISOString()
            });

            lastSubmissionTime = Date.now();
            document.getElementById('quantity').value = 1;
            
            closeBottomSheet();
            renderHistory(); 
            showToast("✅ Record saved successfully.");
        }

        async function populateFilters() {
            const [sources, sizes] = await Promise.all([db.sources.toArray(), db.sizes.toArray()]);
            document.getElementById('filter-source').innerHTML = `<option value="">All Sources</option>` + sources.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
            document.getElementById('filter-size').innerHTML = `<option value="">All Sizes</option>` + sizes.map(sz => `<option value="${sz.id}">${sz.name}</option>`).join('');
        }

        async function renderHistory() {
            const container = document.getElementById('history-container');
            const fSrc = document.getElementById('filter-source').value;
            const fSz = document.getElementById('filter-size').value;

            const [logs, srcMap, szMap] = await Promise.all([
                db.logs.orderBy('datetime').reverse().toArray(),
                db.sources.toArray().then(arr => new Map(arr.map(i => [i.id, i.name]))),
                db.sizes.toArray().then(arr => new Map(arr.map(i => [i.id, i.name])))
            ]);

            let filtered = logs;
            if(fSrc) filtered = filtered.filter(l => l.sourceId === parseInt(fSrc));
            if(fSz) filtered = filtered.filter(l => l.sizeId === parseInt(fSz));

            if(filtered.length === 0) {
                container.innerHTML = `<p class="text-center text-slate-500 py-6 text-xs">No entries recorded.</p>`;
                return;
            }

            container.innerHTML = filtered.map(l => {
                let dateStr = new Date(l.datetime).toLocaleDateString('en-US', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
                return `
                    <div class="bg-slate-800 border border-slate-700 p-3 rounded-xl flex justify-between items-center shadow-sm">
                        <div>
                            <div class="flex items-center space-x-2">
                                <span class="text-[10px] px-1.5 py-0.5 font-bold rounded bg-emerald-950 text-emerald-400 border border-emerald-800">${szMap.get(l.sizeId) || 'Unknown'}</span>
                                <span class="font-medium text-xs text-slate-200">${srcMap.get(l.sourceId) || 'Deleted Source'}</span>
                            </div>
                            <p class="text-[10px] text-slate-500 mt-1">${dateStr}</p>
                        </div>
                        <div class="text-right flex items-center space-x-3">
                            <div>
                                <span class="text-base font-extrabold text-slate-100">${l.quantity}</span> <span class="text-[10px] text-slate-400">pcs</span>
                            </div>
                            <button onclick="deleteLog(${l.id})" class="text-rose-400 text-xs hover:underline">Delete</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function deleteLog(id) {
            if(confirm("Delete this log?")) {
                await db.logs.delete(id);
                renderHistory();
            }
        }

        async function renderStats() {
            const [logs, sources, sizes] = await Promise.all([db.logs.toArray(), db.sources.toArray(), db.sizes.toArray()]);
            let totalBags = 0;
            let srcCounts = Object.fromEntries(sources.map(s => [s.id, 0]));
            let szCounts = Object.fromEntries(sizes.map(sz => [sz.id, 0]));

            logs.forEach(l => {
                totalBags += l.quantity;
                if(srcCounts[l.sourceId] !== undefined) srcCounts[l.sourceId] += l.quantity;
                if(szCounts[l.sizeId] !== undefined) szCounts[l.sizeId] += l.quantity;
            });

            document.getElementById('stat-total-bags').textContent = totalBags;
            document.getElementById('stat-total-events').textContent = logs.length;

            if(sourceChartInstance) sourceChartInstance.destroy();
            if(sizeChartInstance) sizeChartInstance.destroy();

            const createChartConfig = (labels, values) => ({
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{ data: values, backgroundColor: ['#34d399', '#60a5fa', '#f59e0b', '#a78bfa', '#f43f5e', '#cbd5e1'], borderWidth: 0 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', font: { size: 10 } } } } }
            });

            sourceChartInstance = new Chart(document.getElementById('sourceChart'), createChartConfig(sources.map(s => s.name), Object.values(srcCounts)));
            sizeChartInstance = new Chart(document.getElementById('sizeChart'), createChartConfig(sizes.map(sz => sz.name), Object.values(szCounts)));
        }

        async function renderConfigPanel() {
            const [sources, sizes] = await Promise.all([db.sources.toArray(), db.sizes.toArray()]);
            document.getElementById('config-sources-list').innerHTML = sources.map(s => `
                <div class="flex items-center space-x-2">
                    <input type="text" value="${s.name}" onchange="updateMetadata('sources', ${s.id}, this.value)" class="bg-slate-700 border border-slate-600 rounded px-2 py-1 text-xs w-full text-slate-200 focus:outline-none">
                    <button onclick="deleteMetadata('sources', ${s.id})" class="text-rose-400 text-xs px-1">✕</button>
                </div>
            `).join('');

            document.getElementById('config-sizes-list').innerHTML = sizes.map(sz => `
                <div class="flex items-center space-x-2">
                    <input type="text" value="${sz.name}" onchange="updateMetadata('sizes', ${sz.id}, this.value)" class="bg-slate-700 border border-slate-600 rounded px-2 py-1 text-xs w-full text-slate-200 focus:outline-none">
                    <button onclick="deleteMetadata('sizes', ${sz.id})" class="text-rose-400 text-xs px-1">✕</button>
                </div>
            `).join('');
        }

        async function updateMetadata(table, id, newVal) {
            if(!newVal.trim()) return;
            await db[table].update(id, { name: newVal.trim() });
            showToast("✏️ Mapping updated.");
        }

        async function addMetadata(table, inputId) {
            const el = document.getElementById(inputId);
            const val = el.value.trim();
            if(!val) return;
            await db[table].add({ name: val });
            el.value = '';
            renderConfigPanel();
            showToast("✨ Configuration updated.");
        }

        async function deleteMetadata(table, id) {
            if(confirm("Delete configuration reference link?")) {
                await db[table].delete(id);
                renderConfigPanel();
            }
        }

        async function exportData() {
            const backup = { logs: await db.logs.toArray(), sources: await db.sources.toArray(), sizes: await db.sizes.toArray() };
            const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `polytrack-backup-${new Date().toISOString().split('T')[0]}.json`;
            a.click(); URL.revokeObjectURL(url);
            showToast("📤 Export complete.");
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const parsed = JSON.parse(e.target.result);
                    if (parsed.logs && parsed.sources && parsed.sizes) {
                        await db.transaction('rw', [db.logs, db.sources, db.sizes], async () => {
                            await db.logs.clear(); await db.sources.clear(); await db.sizes.clear();
                            await db.logs.bulkAdd(parsed.logs); await db.sources.bulkAdd(parsed.sources); await db.sizes.bulkAdd(parsed.sizes);
                        });
                        showToast("📥 Restore operation complete.");
                        populateFilters(); renderHistory();
                    }
                } catch (err) { showToast("❌ Invalid file format."); }
            };
            reader.readAsText(file);
        }

        // Service Worker registration targeting external file handle
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Service Worker Registered Legally Scope:', reg.scope))
                .catch(err => console.log('Registration skipped:', err));
            });
        }
    </script>
</body>
</html>
